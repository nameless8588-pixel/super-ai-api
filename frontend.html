<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 3px; }
        .message pre { white-space: pre-wrap; word-wrap: break-word; background: #1f2937; padding: 0.5rem; border-radius: 0.5rem; margin-top: 0.5rem; font-size: 0.8rem; }
        .tool-item { transition: all 0.2s; }
        .tool-item:hover { background-color: #374151; }
        .chat-message { margin-bottom: 1rem; display: flex; }
        .chat-message.user { justify-content: flex-end; }
        .chat-message.bot { justify-content: flex-start; }
        .message-bubble { max-width: 80%; padding: 0.75rem; border-radius: 1rem; }
        .chat-message.user .message-bubble { background-color: #10b981; color: white; border-bottom-right-radius: 0; }
        .chat-message.bot .message-bubble { background-color: #1f2937; color: #e5e7eb; border-bottom-left-radius: 0; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans h-screen overflow-hidden">

<div class="flex h-full">
    <!-- LEFT SIDEBAR -->
    <aside class="w-80 bg-gray-800 flex flex-col overflow-hidden border-r border-gray-700">
        <!-- Sidebar Header -->
        <div class="p-4 border-b border-gray-700 flex items-center justify-between">
            <h2 class="text-xl font-bold text-green-400">Super AI</h2>
            <button id="settingsBtn" class="text-gray-400 hover:text-white transition">
                <i class="fas fa-ellipsis-v text-xl"></i>
            </button>
        </div>

        <!-- Tools Accordion -->
        <div class="flex-1 overflow-y-auto p-2">
            <details class="mb-4" open>
                <summary class="cursor-pointer text-green-400 font-semibold mb-2 flex items-center gap-2">
                    <i class="fas fa-folder-open"></i> Tools
                </summary>
                <div class="ml-4 space-y-1">
                    <!-- Bypass Tools -->
                    <div class="font-medium text-gray-300 mt-2 mb-1 text-sm">🔓 Bypass</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="loginbypass">Login Bypass (HTML)</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="jsbypass">JS Bypass (JSON/API)</button>

                    <!-- Web Vulnerabilities -->
                    <div class="font-medium text-gray-300 mt-2 mb-1 text-sm">💉 Web Vulns</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="xsstest">XSS Test</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="sqlinject">SQL Injection</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="dirscan">Directory Scan</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="sensitivefiles">Sensitive Files</button>

                    <!-- Security Headers & Misc -->
                    <div class="font-medium text-gray-300 mt-2 mb-1 text-sm">🛡️ Security</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="headers">Security Headers</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="corscheck">CORS Check</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="cookiecheck">Cookie Check</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="clickjack">Clickjacking Test</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="ratelimit">Rate Limit Test</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="redirecttest">Open Redirect</button>

                    <!-- Network / Infrastructure -->
                    <div class="font-medium text-gray-300 mt-2 mb-1 text-sm">🌐 Network</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="webscan">Web Scan</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="sslcheck">SSL Check</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="portscan">Port Scan</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="subdomains">Subdomains</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="whois">WHOIS</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="dns">DNS Lookup</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="netanalyze">Network Analyze</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="techdetect">Tech Detect</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="robots">Robots.txt</button>

                    <!-- Aggressive / Full Audit -->
                    <div class="font-medium text-gray-300 mt-2 mb-1 text-sm">⚡ Aggressive</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="fullaudit">Full Audit</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="aggressiveattack">Aggressive Attack</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="aggressive">Advanced Aggressive</button>

                    <!-- Credentials / Passwords -->
                    <div class="font-medium text-gray-300 mt-2 mb-1 text-sm">🔑 Credentials</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="passcheck">Password Strength</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="hashcrack">Hash Crack</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="iprep">IP Reputation</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="jwtcheck">JWT Check</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="apiscan">API Endpoint Scan</button>

                    <!-- AI Tools -->
                    <div class="font-medium text-gray-300 mt-2 mb-1 text-sm">🤖 AI</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="ask">Ask AI</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="webapp">Generate Web App</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="breakcode">Code Breaker</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="agent">AI Agent</button>
                </div>
            </details>

            <!-- Old Chats -->
            <div class="mt-4">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-green-400 font-semibold"><i class="fas fa-history mr-2"></i>Old Chats</h3>
                    <button id="clearAllChatsBtn" class="text-xs text-red-400 hover:text-red-300">Clear all</button>
                </div>
                <div id="chatSessionsList" class="space-y-1"></div>
            </div>
        </div>
    </aside>

    <!-- RIGHT MAIN: CHAT AREA -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Chat Header -->
        <div class="p-4 border-b border-gray-700 bg-gray-800">
            <div class="flex items-center justify-between">
                <h1 class="text-lg font-semibold">AI Assistant</h1>
                <div class="text-sm text-gray-400">
                    <i class="fas fa-key mr-1"></i> API Key: <span id="currentApiKeyDisplay">****</span>
                </div>
            </div>
        </div>

        <!-- Chat Messages -->
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

        <!-- Input Area -->
        <div class="p-4 border-t border-gray-700 bg-gray-800">
            <div class="flex gap-2">
                <input type="text" id="chatInput" placeholder="Ask me anything, or click a tool from the sidebar..." class="flex-1 bg-gray-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                <button id="sendBtn" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg transition flex items-center gap-2">
                    <i class="fas fa-paper-plane"></i> Send
                </button>
            </div>
        </div>
    </main>
</div>

<!-- Settings Modal (hidden by default) -->
<div id="settingsModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden transition-all">
    <div class="bg-gray-800 rounded-lg p-6 w-96 shadow-xl border border-gray-700">
        <h3 class="text-xl font-bold mb-4 text-green-400">Settings</h3>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">API Key</label>
            <input type="text" id="settingsApiKey" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white">
        </div>
        <div class="flex justify-end gap-2">
            <button id="saveSettingsBtn" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded">Save</button>
            <button id="closeSettingsBtn" class="bg-gray-600 hover:bg-gray-500 px-4 py-2 rounded">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ========== CONFIG ==========
    const API_BASE = 'https://super-ai-api.onrender.com';
    let currentApiKey = localStorage.getItem('apiKey') || 'SUPER-AI-FREE-001';
    let currentSessionId = localStorage.getItem('currentSessionId') || generateSessionId();
    let sessions = JSON.parse(localStorage.getItem('chatSessions') || '{}');
    let currentMessages = [];

    // Helper: generate random session ID
    function generateSessionId() {
        return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    }

    // Load chat messages for current session
    function loadCurrentSession() {
        if (!sessions[currentSessionId]) {
            sessions[currentSessionId] = { name: formatDate(new Date()), messages: [] };
        }
        currentMessages = sessions[currentSessionId].messages;
        renderChatMessages();
        updateChatSessionsList();
        saveSessionsToStorage();
    }

    // Save sessions to localStorage
    function saveSessionsToStorage() {
        localStorage.setItem('chatSessions', JSON.stringify(sessions));
        localStorage.setItem('currentSessionId', currentSessionId);
    }

    // Format date for chat session name
    function formatDate(date) {
        return date.toLocaleString();
    }

    // Update old chats sidebar
    function updateChatSessionsList() {
        const container = document.getElementById('chatSessionsList');
        container.innerHTML = '';
        const sessionIds = Object.keys(sessions);
        // Sort by newest first (based on creation timestamp in sessionId)
        sessionIds.sort((a,b) => {
            const aTime = parseInt(a.split('_')[1]) || 0;
            const bTime = parseInt(b.split('_')[1]) || 0;
            return bTime - aTime;
        });
        for (const sid of sessionIds) {
            const session = sessions[sid];
            const firstMsg = session.messages.find(m => m.role === 'user')?.content || 'Empty chat';
            const shortMsg = firstMsg.length > 30 ? firstMsg.substring(0,30)+'...' : firstMsg;
            const li = document.createElement('div');
            li.className = 'p-2 rounded cursor-pointer hover:bg-gray-700 flex justify-between items-center group';
            li.innerHTML = `
                <div class="flex-1 truncate">
                    <div class="text-sm font-medium">${session.name}</div>
                    <div class="text-xs text-gray-400 truncate">${shortMsg}</div>
                </div>
                <button class="delete-chat opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 mr-1" data-sid="${sid}">
                    <i class="fas fa-trash-alt text-xs"></i>
                </button>
            `;
            li.addEventListener('click', (e) => {
                if (e.target.closest('.delete-chat')) return;
                switchChat(sid);
            });
            const delBtn = li.querySelector('.delete-chat');
            if (delBtn) delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteChatSession(sid);
            });
            container.appendChild(li);
        }
    }

    function deleteChatSession(sid) {
        if (sid === currentSessionId) {
            // switch to a new session
            const newId = generateSessionId();
            sessions[newId] = { name: formatDate(new Date()), messages: [] };
            currentSessionId = newId;
            loadCurrentSession();
        }
        delete sessions[sid];
        saveSessionsToStorage();
        updateChatSessionsList();
        if (currentSessionId !== sid) {
            // if we deleted other session, just refresh list
            loadCurrentSession(); // reload to ensure current messages correct
        }
    }

    function switchChat(sid) {
        currentSessionId = sid;
        loadCurrentSession();
    }

    function startNewChat() {
        const newId = generateSessionId();
        currentSessionId = newId;
        sessions[newId] = { name: formatDate(new Date()), messages: [] };
        saveSessionsToStorage();
        loadCurrentSession();
    }

    // Add a message to current session
    function addMessage(role, content, isToolResult = false) {
        const msg = { role, content, timestamp: new Date().toISOString() };
        currentMessages.push(msg);
        saveSessionsToStorage();
        renderChatMessages();
    }

    // Render messages in chat area
    function renderChatMessages() {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        for (const msg of currentMessages) {
            const isUser = msg.role === 'user';
            const bubbleClass = isUser ? 'bg-green-600 text-white' : 'bg-gray-700 text-gray-200';
            const alignClass = isUser ? 'justify-end' : 'justify-start';
            const content = msg.content;
            // Check if content contains JSON (tool result)
            let displayContent = content;
            try {
                const parsed = JSON.parse(content);
                displayContent = `<pre class="bg-gray-800 p-2 rounded text-xs overflow-auto">${JSON.stringify(parsed, null, 2)}</pre>`;
            } catch(e) { /* not json */ }
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${alignClass}`;
            messageDiv.innerHTML = `
                <div class="max-w-3/4 p-3 rounded-lg ${bubbleClass} shadow">
                    ${displayContent}
                    <div class="text-xs mt-1 opacity-70">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                </div>
            `;
            container.appendChild(messageDiv);
        }
        container.scrollTop = container.scrollHeight;
    }

    // ========== API CALLS ==========
    async function callAPI(endpoint, params = {}) {
        const url = new URL(`${API_BASE}/${endpoint}`);
        Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
        const response = await fetch(url, {
            headers: { 'X-API-Key': currentApiKey }
        });
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        return await response.json();
    }

    async function callAPIPost(endpoint, body) {
        const response = await fetch(`${API_BASE}/${endpoint}`, {
            method: 'POST',
            headers: { 'X-API-Key': currentApiKey, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
    }

    // Tool execution: show input modal (simple prompt)
    async function runTool(toolName) {
        const paramsMap = {
            loginbypass: { url: 'URL' },
            jsbypass: { url: 'URL' },
            xsstest: { url: 'URL' },
            sqlinject: { url: 'URL' },
            fullaudit: { domain: 'Domain' },
            aggressiveattack: { domain: 'Domain' },
            aggressive: { domain: 'Domain' },
            webscan: { url: 'URL' },
            headers: { url: 'URL' },
            sslcheck: { domain: 'Domain' },
            portscan: { domain: 'Domain' },
            subdomains: { domain: 'Domain' },
            whois: { domain: 'Domain' },
            dns: { domain: 'Domain' },
            netanalyze: { domain: 'Domain' },
            techdetect: { url: 'URL' },
            robots: { domain: 'Domain' },
            dirscan: { domain: 'Domain' },
            sensitivefiles: { domain: 'Domain' },
            corscheck: { url: 'URL' },
            cookiecheck: { url: 'URL' },
            clickjack: { url: 'URL' },
            ratelimit: { url: 'URL' },
            redirecttest: { url: 'URL' },
            passcheck: { password: 'Password' },
            hashcrack: { hash_value: 'Hash' },
            iprep: { ip: 'IP' },
            jwtcheck: { token: 'JWT Token' },
            apiscan: { url: 'URL' },
            ask: { q: 'Question' },
            webapp: { task: 'Web app description' },
            agent: { task: 'Task description' },
            breakcode: { code: 'Python code' },
        };
        const params = paramsMap[toolName];
        if (!params) {
            alert(`Tool ${toolName} not configured yet.`);
            return;
        }
        const paramKeys = Object.keys(params);
        const paramValues = {};
        for (const key of paramKeys) {
            const val = prompt(`Enter ${params[key]} for ${toolName}:`);
            if (val === null) return; // cancel
            paramValues[key] = val;
        }
        addMessage('user', `Running ${toolName} with ${JSON.stringify(paramValues)}`);
        try {
            let result;
            if (toolName === 'breakcode') {
                result = await callAPIPost(toolName, paramValues);
            } else {
                result = await callAPI(toolName, paramValues);
            }
            addMessage('bot', JSON.stringify(result, null, 2), true);
        } catch (error) {
            addMessage('bot', `Error: ${error.message}`, true);
        }
    }

    // Chat interaction using /chat endpoint
    async function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';
        addMessage('user', msg);
        // Show typing indicator (optional)
        try {
            const response = await callAPI('chat', { msg, session: currentSessionId });
            addMessage('bot', response.reply || 'No reply');
        } catch (error) {
            addMessage('bot', `Chat error: ${error.message}`);
        }
    }

    // ========== UI HANDLERS ==========
    document.getElementById('sendBtn').addEventListener('click', sendChatMessage);
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChatMessage();
    });

    // Settings modal
    const modal = document.getElementById('settingsModal');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeSettings = document.getElementById('closeSettingsBtn');
    const saveSettings = document.getElementById('saveSettingsBtn');
    const settingsApiKeyInput = document.getElementById('settingsApiKey');
    const currentKeySpan = document.getElementById('currentApiKeyDisplay');

    function updateApiKeyDisplay() {
        currentKeySpan.textContent = currentApiKey.substring(0,4)+'****';
    }
    updateApiKeyDisplay();

    settingsBtn.addEventListener('click', () => {
        settingsApiKeyInput.value = currentApiKey;
        modal.classList.remove('hidden');
    });
    closeSettings.addEventListener('click', () => modal.classList.add('hidden'));
    saveSettings.addEventListener('click', () => {
        const newKey = settingsApiKeyInput.value.trim();
        if (newKey) {
            currentApiKey = newKey;
            localStorage.setItem('apiKey', currentApiKey);
            updateApiKeyDisplay();
        }
        modal.classList.add('hidden');
    });
    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.add('hidden');
    });

    // New chat button (could add, but we'll provide via "Clear all chats" maybe)
    document.getElementById('clearAllChatsBtn').addEventListener('click', () => {
        if (confirm('Delete ALL chat sessions? This cannot be undone.')) {
            sessions = {};
            currentSessionId = generateSessionId();
            sessions[currentSessionId] = { name: formatDate(new Date()), messages: [] };
            saveSessionsToStorage();
            loadCurrentSession();
        }
    });

    // Attach tool listeners
    document.querySelectorAll('.tool-item').forEach(btn => {
        btn.addEventListener('click', () => {
            const tool = btn.dataset.tool;
            runTool(tool);
        });
    });

    // Initialize
    loadCurrentSession();
    // Optionally, if there are no messages, show a welcome message
    if (currentMessages.length === 0) {
        addMessage('bot', 'Hello! I am your Super AI assistant. Use the tools on the left or chat with me.');
    }
</script>
</body>
</html>
