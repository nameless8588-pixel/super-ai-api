<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 3px; }
        .message pre { white-space: pre-wrap; word-wrap: break-word; background: #1f2937; padding: 0.5rem; border-radius: 0.5rem; margin-top: 0.5rem; font-size: 0.8rem; }
        .tool-item { transition: all 0.2s; }
        .tool-item:hover { background-color: #374151; }
        .chat-message { margin-bottom: 1rem; display: flex; }
        .chat-message.user { justify-content: flex-end; }
        .chat-message.bot { justify-content: flex-start; }
        .message-bubble { max-width: 80%; padding: 0.75rem; border-radius: 1rem; }
        .chat-message.user .message-bubble { background-color: #10b981; color: white; border-bottom-right-radius: 0; }
        .chat-message.bot .message-bubble { background-color: #1f2937; color: #e5e7eb; border-bottom-left-radius: 0; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans h-screen overflow-hidden">
<div class="flex h-full">
    <!-- LEFT SIDEBAR -->
    <aside class="w-80 bg-gray-800 flex flex-col overflow-hidden border-r border-gray-700">
        <div class="p-4 border-b border-gray-700 flex items-center justify-between">
            <h2 class="text-xl font-bold text-green-400">Super AI</h2>
            <div class="flex gap-2">
                <button id="newChatBtn" class="text-gray-400 hover:text-green-400 transition" title="New Chat">
                    <i class="fas fa-plus text-lg"></i>
                </button>
                <button id="settingsBtn" class="text-gray-400 hover:text-white transition">
                    <i class="fas fa-ellipsis-v text-xl"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-2">
            <details class="mb-4" open>
                <summary class="cursor-pointer text-green-400 font-semibold mb-2 flex items-center gap-2">
                    <i class="fas fa-folder-open"></i> Tools
                </summary>
                <div class="ml-4 space-y-1">
                    <!-- Bypass -->
                    <div class="font-medium text-gray-400 mt-2 mb-1 text-xs uppercase tracking-wider"> Bypass</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="loginbypass">Login Bypass (HTML)</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="jsbypass">JS Bypass (JSON/API)</button>

                    <!-- Web Vulns -->
                    <div class="font-medium text-gray-400 mt-2 mb-1 text-xs uppercase tracking-wider"> Web Vulns</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="xsstest">XSS Test</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="sqlinject">SQL Injection</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="dirscan">Directory Scan</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="sensitivefiles">Sensitive Files</button>

                    <!-- Security -->
                    <div class="font-medium text-gray-400 mt-2 mb-1 text-xs uppercase tracking-wider">️ Security</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="headers">Security Headers</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="corscheck">CORS Check</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="cookiecheck">Cookie Check</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="clickjack">Clickjacking Test</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="ratelimit">Rate Limit Test</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="redirecttest">Open Redirect</button>

                    <!-- Network -->
                    <div class="font-medium text-gray-400 mt-2 mb-1 text-xs uppercase tracking-wider"> Network</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="webscan">Web Scan</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="sslcheck">SSL Check</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="portscan">Port Scan</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="subdomains">Subdomains</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="whois">WHOIS</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="dns">DNS Lookup</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="netanalyze">Network Analyze</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="techdetect">Tech Detect</button>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="robots">Robots.txt</button>

                    <!-- Aggressive -->
                    <div class="font-medium text-gray-400 mt-2 mb-1 text-xs uppercase tracking-wider"> Aggressive</div>
                    <button class="tool-item w-full text-left p-2 rounded text-sm" data-tool="aggressiveScan">Aggressive Scan</button>
                </div>
            </details>
        </div>
    </aside>
    <!-- MAIN CONTENT -->
    <div class="flex-1 p-4 overflow-y-auto">
        <div id="error Messages" class="text-red-500 text-lg font-bold mb-2"></div>
        <div id="chatLog" class="space-y-2">
            <!-- chat log will be displayed here -->
        </div>
        <div id="inputField" class="mt-4">
            <input type="text" id="userInput" class="w-full p-2 rounded text-sm" placeholder="Type a message...">
            <button id="sendBtn" class="ml-2 bg-green-400 text-white p-2 rounded text-sm">Send</button>
        </div>
    </div>
</div>
<script>
    // Add event listeners to buttons
    const toolButtons = document.querySelectorAll('.tool-item');
    toolButtons.forEach(button => {
        button.addEventListener('click', () => {
            const toolName = button.getAttribute('data-tool');
            // Send API request to the selected tool
            fetch(`/api/${toolName}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
            })
            .then(data => {
                console.log(data);
                // Display the response in the chat log
                const chatLog = document.getElementById('chatLog');
                const message = document.createElement('div');
                message.classList.add('chat-message', 'bot');
                message.innerHTML = `
                    <div class="message-bubble">
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
                chatLog.appendChild(message);
            })
            .catch(error => {
                console.error(error);
                // Display error message
                const errorMessages = document.getElementById('errorMessages');
                errorMessages.textContent = `Error: ${error.message}`;
            });
        });
    });

    // Add event listener to send button
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.addEventListener('click', () => {
        const userInput = document.getElementById('userInput');
        const userMessage = userInput.value.trim();
        if (userMessage) {
            // Send API request to the server
            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: userMessage })
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
            })
            .then(data => {
                console.log(data);
                // Display the response in the chat log
                const chatLog = document.getElementById('chatLog');
                const message = document.createElement('div');
                message.classList.add('chat-message', 'bot');
                message.innerHTML = `
                    <div class="message-bubble">
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
                chatLog.appendChild(message);
                // Clear user input field
                userInput.value = '';
            })
            .catch(error => {
                console.error(error);
                // Display error message
                const errorMessages = document.getElementById('errorMessages');
                errorMessages.textContent = `Error: ${error.message}`;
            });
        }
    });
</script>
</body>
</html>
