<html lang="en">
<head>
    <meta charset="UTF-8">

        ::-webkit-scrollbar-track { background: #1f2937; }

        .message pre { white-space: pre-wrap; word-wrap: break-word; background: #1f2937; padding: 0.5rem; border-radius: 0.5rem; margin-top: 0.5rem; font-size: 0.8rem; }

        .chat-message.bot .message-bubble { background-color: #1f2937; color: #e5e7eb; border-bottom-left-radius: 0; }

</head>

<!-- Selfupgrade Modal -->
<div id="upgradeModal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">
    <div class="bg-gray-800 rounded-lg p-6 w-[500px] shadow-xl border border-yellow-700">
        <h3 class="text-xl font-bold mb-2 text-yellow-400"> Self Upgrade</h3>
        <p class="text-gray-400 text-sm mb-4">AI ko batao kya naya endpoint banana hai — woh khud code likhega aur GitHub pe push karega!</p>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Instruction</label>
            <textarea id="upgradeInstruction" rows="3" placeholder="e.g. add a weather endpoint that takes city as input and returns temperature"
                class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-500"></textarea>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Mode</label>
            <select id="upgradeMode" class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm w-full">
                <option value="append">Append (Naya endpoint add karo) ✅ Safe</option>
                <option value="modify">Modify (Existing endpoint edit karo) ⚠️ Risky</option>
            </select>
        </div>
        <div id="upgradeResult" class="hidden mb-4 p-3 bg-gray-900 rounded text-sm text-gray-300 max-h-32 overflow-auto"></div>
        <div class="flex justify-end gap-2">
            <button id="runUpgradeBtn" class="bg-yellow-600 hover:bg-yellow-700 px-4 py-2 rounded font-semibold"> Upgrade Karo</button>
            <button id="closeUpgradeBtn" class="bg-gray-600 hover:bg-gray-500 px-4 py-2 rounded">Cancel</button>
        </div>
    </div>
</div>

<script>
const API_BASE = 'https://super-ai-api.onrender.com';
let currentApiKey = localStorage.getItem('sai_apiKey') || 'SUPER-AI-FREE-001';
let bossKey = localStorage.getItem('sai_bossKey') || '';
let currentSessionId = localStorage.getItem('currentSessionId') || generateSessionId();
let sessions = JSON.parse(localStorage.getItem('chatSessions') || '{}');
let currentMessages = [];
let currentModel = localStorage.getItem('sai_model') || 'auto';

function generateSessionId() {
    return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
}

function loadCurrentSession() {
    if (!sessions[currentSessionId]) {
        sessions[currentSessionId] = { name: new Date().toLocaleString(), messages: [] };
    }
    currentMessages = sessions[currentSessionId].messages;
    renderChatMessages();
    updateChatSessionsList();
    saveToStorage();
}

function saveToStorage() {
    localStorage.setItem('chatSessions', JSON.stringify(sessions));
    localStorage.setItem('currentSessionId', currentSessionId);
}

function updateChatSessionsList() {
    const container = document.getElementById('chatSessionsList');
    container.innerHTML = '';
    const ids = Object.keys(sessions).sort((a,b) => {
        return (parseInt(b.split('_')[1])||0) - (parseInt(a.split('_')[1])||0);
    });
    for (const sid of ids) {
        const session = sessions[sid];
        const firstMsg = session.messages.find(m => m.role === 'user')?.content || 'Empty chat';
        const shortMsg = firstMsg.length > 28 ? firstMsg.substring(0,28)+'...' : firstMsg;
        const div = document.createElement('div');
        div.className = `p-2 rounded cursor-pointer hover:bg-gray-700 flex justify-between items-center group ${sid === currentSessionId ? 'bg-gray-700 border-l-2 border-green-500' : ''}`;
        div.innerHTML = `
            <div class="flex-1 truncate" onclick="switchChat('${sid}')">
                <div class="text-xs font-medium text-gray-300">${session.name}</div>
                <div class="text-xs text-gray-500 truncate">${shortMsg}</div>
            </div>
            <button class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 ml-1 text-xs" onclick="deleteChatSession('${sid}')">
                <i class="fas fa-trash-alt"></i>
            </button>`;
        container.appendChild(div);
    }
}

function switchChat(sid) {
    currentSessionId = sid;
    loadCurrentSession();
}

function deleteChatSession(sid) {
    if (sid === currentSessionId) {
        startNewChat();
    }
    delete sessions[sid];
    saveToStorage();
    updateChatSessionsList();
}

function startNewChat() {
    const newId = generateSessionId();
    currentSessionId = newId;
    sessions[newId] = { name: new Date().toLocaleString(), messages: [] };
    saveToStorage();
    loadCurrentSession();
}

function addMessage(role, content) {
    currentMessages.push({ role, content, timestamp: new Date().toISOString() });
    if (role === 'user' && currentMessages.filter(m=>m.role==='user').length === 1) {
        sessions[currentSessionId].name = content.substring(0,25) + (content.length>25?'...':'');
    }
    saveToStorage();
    renderChatMessages();
}

function renderChatMessages() {
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    if (currentMessages.length === 0) {
        container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-gray-600">
            <i class="fas fa-robot text-4xl mb-3"></i>
            <p class="text-lg">Super AI ready hai!</p>
            <p class="text-sm mt-1">Left sidebar se tool choose karo ya seedha chat karo</p>
        </div>`;
        return;
    }
    for (const msg of currentMessages) {
        const isUser = msg.role === 'user';
        let displayContent = msg.content;
        try {
            const parsed = JSON.parse(msg.content);
            displayContent = `<pre class="bg-gray-900 p-3 rounded text-xs overflow-auto max-h-64">${JSON.stringify(parsed, null, 2)}</pre>`;
        } catch(e) {
            displayContent = msg.content.replace(/\n/g, '<br>');
        }
        const div = document.createElement('div');
        div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
        div.innerHTML = `
            <div class="max-w-2xl p-3 rounded-lg shadow ${isUser ? 'bg-green-700 text-white' : 'bg-gray-700 text-gray-200'}">
                ${displayContent}
                <div class="text-xs mt-1 opacity-50">${new Date(msg.timestamp).toLocaleTimeString()}</div>
            </div>`;
        container.appendChild(div);
    }
    container.scrollTop = container.scrollHeight;
}

async function callAPI(endpoint, params = {}) {
    const url = new URL(`${API_BASE}/${endpoint}`);
    Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
    const res = await fetch(url, { headers: { 'X-API-Key': currentApiKey } });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    return await res.json();
}

async function callAPIPost(endpoint, body) {
    const res = await fetch(`${API_BASE}/${endpoint}`, {
        method: 'POST',
        headers: { 'X-API-Key': currentApiKey, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
}

const TOOL_PARAMS = {
    loginbypass:    { url: 'Target URL (e.g. https://example.com/login)' },
    jsbypass:       { url: 'Target URL' },
    xsstest:        { url: 'Target URL' },
    sqlinject:      { url: 'Target URL' },
    fullaudit:      { domain: 'Domain (e.g. example.com)' },
    aggressiveattack: { domain: 'Domain' },
    aggressive:     { domain: 'Domain' },
    webscan:        { url: 'URL' },
    headers:        { url: 'URL' },
    sslcheck:       { domain: 'Domain' },
    portscan:       { domain: 'Domain' },
    subdomains:     { domain: 'Domain' },
    whois:          { domain: 'Domain' },
    dns:            { domain: 'Domain' },
    netanalyze:     { domain: 'Domain' },
    techdetect:     { url: 'URL' },
    robots:         { domain: 'Domain' },
    dirscan:        { domain: 'Domain' },
    sensitivefiles: { domain: 'Domain' },
    corscheck:      { url: 'URL' },
    cookiecheck:    { url: 'URL' },
    clickjack:      { url: 'URL' },
    ratelimit:      { url: 'URL' },
    redirecttest:   { url: 'URL' },
    passcheck:      { password: 'Password check karna hai' },
    hashcrack:      { hash_value: 'Hash value' },
    iprep:          { ip: 'IP Address' },
    jwtcheck:       { token: 'JWT Token' },
    apiscan:        { url: 'URL' },
    ask:            { q: 'Sawaal kya hai?' },
    create:         { task: 'Kya code banana hai?', filename: 'Filename (e.g. app.py)' },
    webapp:         { task: 'Web app description' },
    agent:          { task: 'Agent ko kya karna hai?' },
    breakcode:      null,
};

async function runTool(toolName) {
    // Selfupgrade special modal
    if (toolName === 'selfupgrade') {
        document.getElementById('upgradeModal').classList.remove('hidden');
        document.getElementById('upgradeResult').classList.add('hidden');
        document.getElementById('upgradeInstruction').value = '';
        return;
    }

    // Rollback – boss key check
    if (toolName === 'rollback') {
        const key = bossKey || prompt('Boss API Key daalo (rollback ke liye):');
        if (!key) return;
        addMessage('user', 'Rollback kar raha hoon...');
        try {
            const savedKey = currentApiKey;
            currentApiKey = key;
            const result = await callAPI('rollback', {});
            currentApiKey = savedKey;
            addMessage('bot', JSON.stringify(result, null, 2));
        } catch(e) {
            addMessage('bot', `Rollback error: ${e.message}`);
        }
        return;
    }

    const params = TOOL_PARAMS[toolName];
    if (params === undefined) {
        addMessage('bot', `Tool "${toolName}" configure nahi hai abhi.`);
        return;
    }

    // breakcode — POST
    if (toolName === 'breakcode') {
        const code = prompt('Python code paste karo:');
        if (!code) return;
        addMessage('user', `Code breaker chal raha hai...`);
        try {
            const result = await callAPIPost('breakcode', { code });
            addMessage('bot', JSON.stringify(result, null, 2));
        } catch(e) { addMessage('bot', `Error: ${e.message}`); }
        return;
    }

    // Normal tools
    const paramValues = {};
    for (const [key, label] of Object.entries(params)) {
        const val = prompt(`${label}:`);
        if (val === null) return;
        paramValues[key] = val;
    }

    addMessage('user', ` ${toolName} → ${JSON.stringify(paramValues)}`);

    // Loading indicator
    const loadDiv = document.createElement('div');
    loadDiv.id = 'loading-msg';
    loadDiv.className = 'flex justify-start';
    loadDiv.innerHTML = `<div class="bg-gray-700 p-3 rounded-lg text-sm text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>Running ${toolName}...</div>`;
    document.getElementById('chatMessages').appendChild(loadDiv);
    document.getElementById('chatMessages').scrollTop = 99999;

    try {
        const result = await callAPI(toolName, paramValues);
        loadDiv.remove();
        addMessage('bot', JSON.stringify(result, null, 2));
    } catch(e) {
        loadDiv.remove();
        addMessage('bot', `Error: ${e.message}`);
    }
}

async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addMessage('user', msg);

    const loadDiv = document.createElement('div');
    loadDiv.className = 'flex justify-start';
    loadDiv.innerHTML = `<div class="bg-gray-700 p-3 rounded-lg text-sm text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>Soch raha hoon...</div>`;
    document.getElementById('chatMessages').appendChild(loadDiv);
    document.getElementById('chatMessages').scrollTop = 99999;

    try {
        const model = document.getElementById('modelSelect').value;
        const data = await callAPI('chat', { msg: msg, session: currentSessionId });
        loadDiv.remove();
        const reply = data.reply || data.jawab || 'No reply';
        addMessage('bot', reply);
    } catch(e) {
        loadDiv.remove();
        addMessage('bot', `Error: ${e.message}`);
    }
}

document.getElementById('runUpgradeBtn').addEventListener('click', async () => {
    const instruction = document.getElementById('upgradeInstruction').value.trim();
    const mode = document.getElementById('upgradeMode').value;
    if (!instruction) { alert('Instruction daalo!'); return; }

    const btn = document.getElementById('runUpgradeBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Kaam chal raha hai...';

    const resultDiv = document.getElementById('upgradeResult');
    resultDiv.classList.remove('hidden');
    resultDiv.textContent = 'AI code generate kar raha hai...';

    try {
        const data = await callAPI('selfupgrade', { instruction, mode });
        resultDiv.innerHTML = data.status === 'success'
            ? `<span class="text-green-400">✅ Success!</span><br>Added code:<br><code class="text-xs">${data.code_preview || ''}</code>`
            : `<span class="text-red-400">❌ Error: ${data.error || JSON.stringify(data)}</span>`;
        if (data.status === 'success') {
            addMessage('bot', `✅ Self Upgrade successful!\nInstruction: ${instruction}\nMode: ${mode}\n\nAdded code:\n${data.code_preview || ''}\n\nRender pe auto-deploy hoga 2-3 min mein!`);
        }
    } catch(e) {
        resultDiv.innerHTML = `<span class="text-red-400">❌ ${e.message}</span>`;
    }

    btn.disabled = false;
    btn.innerHTML = ' Upgrade Karo';
});

document.getElementById('closeUpgradeBtn').addEventListener('click', () => {
    document.getElementById('upgradeModal').classList.add('hidden');
});

// Event listeners
document.getElementById('sendBtn').addEventListener('click', sendChatMessage);
document.getElementById('chatInput').addEventListener('keypress', e => { if(e.key==='Enter') sendChatMessage(); });
document.getElementById('newChatBtn').addEventListener('click', startNewChat);
document.getElementById('clearAllChatsBtn').addEventListener('click', () => {
    if (confirm('Saare chats delete karo?')) {
        sessions = {};
        currentSessionId = generateSessionId();
        sessions[currentSessionId] = { name: new Date().toLocaleString(), messages: [] };
        saveToStorage();
        loadCurrentSession();
    }
});

// Settings
const modal = document.getElementById('settingsModal');
document.getElementById('settingsBtn').addEventListener('click', () => {
    document.getElementById('settingsApiKey').value = currentApiKey;
    document.getElementById('settingsBossKey').value = bossKey;
    modal.classList.remove('hidden');
});
document.getElementById('closeSettingsBtn').addEventListener('click', () => modal.classList.add('hidden'));
document.getElementById('saveSettingsBtn').addEventListener('click', () => {
    const k = document.getElementById('settingsApiKey').value.trim();
    const bk = document.getElementById('settingsBossKey').value.trim();
    if (k) { currentApiKey = k; localStorage.setItem('sai_apiKey', k); }
    if (bk) { bossKey = bk; localStorage.setItem('sai_bossKey', bk); }
    document.getElementById('currentApiKeyDisplay').textContent = currentApiKey.substring(0,4)+'****';
    modal.classList.add('hidden');
    alert('Settings save ho gayi!');
});
modal.addEventListener('click', e => { if(e.target===modal) modal.classList.add('hidden'); });

// Model change save
document.getElementById('modelSelect').addEventListener('change', e => {
    localStorage.setItem('sai_model', e.target.value);
});

// Tool buttons
document.querySelectorAll('.tool-item').forEach(btn => {
    btn.addEventListener('click', () => runTool(btn.dataset.tool));
});

// Init
document.getElementById('currentApiKeyDisplay').textContent = currentApiKey.substring(0,4)+'****';
const savedModel = localStorage.getItem('sai_model') || 'auto';
document.getElementById('modelSelect').value = savedModel;
loadCurrentSession();
</script>
</body>
</html>
